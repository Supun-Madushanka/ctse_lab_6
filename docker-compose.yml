services:

  # ─────────────────────────────────────────────
  # Apache Kafka in KRaft Mode (No ZooKeeper)
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Fixed Cluster ID required for KRaft mode
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - kafka-net

  # ─────────────────────────────────────────────
  # Kafka UI  (http://localhost:8088)
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - kafka-net

  # ─────────────────────────────────────────────
  # Order Service  (port 8081)
  # Publishes OrderCreated events to order-topic
  # ─────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
    container_name: order-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - kafka-net

  # ─────────────────────────────────────────────
  # Inventory Service  (port 8082)
  # Consumes OrderCreated events → updates stock
  # ─────────────────────────────────────────────
  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - kafka-net

  # ─────────────────────────────────────────────
  # Billing Service  (port 8083)
  # Consumes OrderCreated events → generates invoice
  # ─────────────────────────────────────────────
  billing-service:
    build:
      context: ./billing-service
    container_name: billing-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - kafka-net

  # ─────────────────────────────────────────────
  # API Gateway  (port 8080)
  # Routes /orders/** → order-service:8081
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    depends_on:
      - order-service
    ports:
      - "8080:8080"
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge
